<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
</head>

<body>
  <app-header id="app-header" class="app-header"></app-header>
  
  <main class="app-main">

    <div class="home-links-wrap">
      <img src="/src/assets/type_b/home_link.png">
    </div>

    <div class="carousel-wrap">
      <div class="swiper carousel-1">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_1.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_2.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_9.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_4.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_5.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_6.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_7.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_8.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_hero_3.png">
          </div>
        </div>
        <div class="swiper-control-row">
          <div class="swiper-pagination"></div>
          <div class="swiper-nav-wrap">
            <div class="swiper-button-prev">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 14L4 8L10 2" stroke="#33363D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="swiper-button-next">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 14L11 8L5 2" stroke="#33363D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div> 
        </div>
        
      </div>
    </div>

    <div class="home-content-wrap home-content-1">
      <img src="/src/assets/type_b/home_title_1.png" class="home-title">
    </div>

    <div class="carousel-wrap">
      <div class="swiper carousel-2">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_cloud_1.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_cloud_2.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_cloud_3.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_cloud_4.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_cloud_5.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_cloud_6.png">
          </div>
          <div class="swiper-slide">
            <img src="/src/assets/type_b/card_cloud_7.png">
          </div>
        </div>
        <div class="swiper-control-row" style="margin-top:48px;">
          <div class="swiper-pagination"></div>
          <div class="swiper-nav-wrap">
            <div class="swiper-button-prev">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 14L4 8L10 2" stroke="#33363D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="swiper-button-next">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 14L11 8L5 2" stroke="#33363D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div> 
        </div>
      </div>
    </div>

    <div class="home-content-wrap home-content-2">
      <img src="/src/assets/type_b/home_content_1.png">
    </div>

    <div class="home-content-wrap home-content-3">
      <img src="/src/assets/type_b/home_content_2.png">
    </div>

  </main>

  <app-footer class="app-footer"></app-footer>

  <script type="module" src="/src/b_home.js"></script>
</body>

</html>
